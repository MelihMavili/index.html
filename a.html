<!doctype html>
<html lang="tr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Anneler Günü</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@1,300;1,400&family=Raleway:wght@100;200&display=swap"
      rel="stylesheet"
    />
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body,
      html {
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: radial-gradient(
          ellipse at 50% 0%,
          #1a0828 0%,
          #07091a 55%,
          #020310 100%
        );
      }
      canvas {
        display: block;
      }
      #ui {
        position: absolute;
        bottom: 12%;
        width: 100%;
        text-align: center;
        pointer-events: none;
        opacity: 0;
        transform: translateY(16px);
        transition:
          opacity 2s ease,
          transform 2s ease;
      }
      #ui.on {
        opacity: 1;
        transform: translateY(0);
      }
      .l1 {
        font-family: "Raleway", sans-serif;
        font-weight: 100;
        letter-spacing: 10px;
        font-size: 0.85rem;
        text-transform: uppercase;
        color: rgba(255, 195, 225, 0.65);
        margin-bottom: 12px;
      }
      .l2 {
        font-family: "Cormorant Garamond", serif;
        font-style: italic;
        font-weight: 400;
        font-size: 3.5rem;
        line-height: 1.1;
        color: rgba(255, 228, 242, 0.97);
        text-shadow:
          0 0 22px rgba(255, 110, 175, 0.75),
          0 0 55px rgba(255, 80, 155, 0.35);
      }
      .l3 {
        font-family: "Raleway", sans-serif;
        font-weight: 200;
        letter-spacing: 5px;
        font-size: 0.9rem;
        text-transform: uppercase;
        color: rgba(255, 200, 220, 0.55);
        margin-top: 12px;
      }
      @media (max-width: 800px) {
        .l2 {
          font-size: 2.8rem;
        }
      }
      @media (max-width: 600px) {
        .l2 {
          font-size: 1.8rem;
        }
        .l1 {
          font-size: 0.6rem;
          letter-spacing: 5px;
        }
      }
    </style>
  </head>
  <body>
    <canvas id="c"></canvas>
    <div id="ui">
      <div class="l1">Seni çok seviyorum annecim</div>
      <div class="l2">Anneler Günün Kutlu Olsun</div>
      <div class="l3">♡</div>
    </div>
    <script>
      const canvas = document.getElementById("c");
      const ctx = canvas.getContext("2d");
      let W = (canvas.width = window.innerWidth);
      let H = (canvas.height = window.innerHeight);
      window.addEventListener("resize", () => {
        W = canvas.width = window.innerWidth;
        H = canvas.height = window.innerHeight;
      });

      const T0 = performance.now();
      const ASM = 1800;
      const STAGGER = 120;

      const easeOutBack = (t) => {
        const c = 1.70158 + 1;
        return 1 + c * Math.pow(t - 1, 3) + 1.70158 * Math.pow(t - 1, 2);
      };
      const lerp = (a, b, t) => a + (b - a) * t;
      const clamp = (v, a, b) => Math.max(a, Math.min(b, v));

      const UNIT = () => Math.min(W, H) * 0.38;

      // True bouquet cluster
      const FLOWERS = [
        { ox: -0.16, oy: -0.42, petals: 5, size: 0.8, phase: 1.1, spd: 0.85 },
        { ox: 0.16, oy: -0.42, petals: 5, size: 0.8, phase: 2.0, spd: 0.8 },
        { ox: 0.0, oy: -0.5, petals: 5, size: 1.0, phase: 0.0, spd: 0.7 },
        { ox: -0.1, oy: -0.3, petals: 5, size: 0.95, phase: 2.5, spd: 1.1 },
        { ox: 0.1, oy: -0.3, petals: 5, size: 0.95, phase: 0.8, spd: 1.05 },
        { ox: -0.22, oy: -0.2, petals: 5, size: 0.85, phase: 0.5, spd: 1.0 },
        { ox: 0.22, oy: -0.2, petals: 5, size: 0.85, phase: 1.7, spd: 0.95 },
      ];

      const LEAVES = [
        { ox: -0.32, oy: -0.18, side: -1.1, size: 1.2, phase: 1.5 },
        { ox: 0.32, oy: -0.18, side: 1.1, size: 1.2, phase: 0.3 },
        { ox: -0.15, oy: -0.1, side: -0.8, size: 0.9, phase: 0.9 },
        { ox: 0.15, oy: -0.1, side: 0.8, size: 0.9, phase: 1.8 },
        { ox: -0.05, oy: -0.02, side: -0.5, size: 0.75, phase: 2.2 },
        { ox: 0.05, oy: -0.02, side: 0.5, size: 0.75, phase: 0.6 },
      ];

      function scatter() {
        const side = Math.random() < 0.5 ? -1 : 1;
        return {
          x: side * (W * 0.55 + Math.random() * W * 0.4),
          y: (Math.random() - 0.5) * H * 1.4,
        };
      }
      const FSCATTER = FLOWERS.map(scatter);
      const LSCATTER = LEAVES.map(scatter);

      const sway = (ph, spd, t) => Math.sin(t * 0.0007 * spd + ph) * 0.035;

      function stem(bx, by, fx, fy, a = 1) {
        ctx.save();
        ctx.globalAlpha = a;
        ctx.beginPath();
        const startX = bx + (fx - bx) * 0.15;
        const startY = by + UNIT() * 0.15;
        const cx = (startX + fx) / 2,
          cy = (startY + fy) / 2 + Math.abs(startY - fy) * 0.1;
        ctx.moveTo(startX, startY);
        ctx.quadraticCurveTo(cx, cy, fx, fy);
        const g = ctx.createLinearGradient(startX, startY, fx, fy);
        g.addColorStop(0, "rgba(160,70,120,0.8)");
        g.addColorStop(1, "rgba(255,195,225,0.5)");
        ctx.strokeStyle = g;
        ctx.lineWidth = 3;
        ctx.shadowBlur = 6;
        ctx.shadowColor = "rgba(255,100,175,0.3)";
        ctx.stroke();
        ctx.restore();
      }

      function leaf(lx, ly, side, size, sw, unit, a = 1) {
        const len = unit * 0.29 * size;
        ctx.save();
        ctx.globalAlpha = a;
        ctx.translate(lx, ly);
        ctx.rotate(side * (0.58 + sw));
        ctx.beginPath();
        ctx.moveTo(0, 0);
        ctx.bezierCurveTo(
          side * len * 0.38,
          -len * 0.38,
          side * len * 0.32,
          -len * 0.78,
          0,
          -len,
        );
        ctx.bezierCurveTo(
          -side * len * 0.28,
          -len * 0.78,
          -side * len * 0.28,
          -len * 0.38,
          0,
          0,
        );
        ctx.closePath();
        const g = ctx.createLinearGradient(0, 0, 0, -len);
        g.addColorStop(0, "rgba(188,82,152,0.7)");
        g.addColorStop(1, "rgba(255,170,218,0.92)");
        ctx.fillStyle = g;
        ctx.shadowBlur = 22;
        ctx.shadowColor = "rgba(255,100,175,0.55)";
        ctx.fill();
        ctx.beginPath();
        ctx.moveTo(0, -2);
        ctx.lineTo(0, -len * 0.85);
        ctx.strokeStyle = "rgba(255,230,245,0.4)";
        ctx.lineWidth = 0.9;
        ctx.stroke();
        ctx.restore();
      }

      function flower(fx, fy, petals, size, sw, unit, a = 1) {
        const R = unit * 0.155 * size;
        const PW = R * 0.62;
        const PH = R * 0.95;
        ctx.save();
        ctx.globalAlpha = a;
        ctx.translate(fx, fy);
        ctx.rotate(sw);

        for (let i = 0; i < petals; i++) {
          ctx.save();
          ctx.rotate((i / petals) * Math.PI * 2);
          ctx.translate(0, -R * 0.42);
          ctx.beginPath();
          ctx.ellipse(0, 0, PW * 0.5, PH * 0.55, 0, 0, Math.PI * 2);
          const pg = ctx.createRadialGradient(
            0,
            PH * 0.1,
            0,
            0,
            -PH * 0.2,
            PH * 0.65,
          );
          pg.addColorStop(0, "rgba(255,215,235,0.98)");
          pg.addColorStop(0.45, "rgba(255,155,200,0.82)");
          pg.addColorStop(1, "rgba(220,90,170,0.25)");
          ctx.fillStyle = pg;
          ctx.shadowBlur = 30;
          ctx.shadowColor = "rgba(255,120,190,0.75)";
          ctx.fill();
          ctx.strokeStyle = "rgba(255,235,248,0.55)";
          ctx.lineWidth = 0.8;
          ctx.stroke();
          ctx.restore();
        }

        const cR = unit * 0.038 * size;
        const cg = ctx.createRadialGradient(0, 0, 0, 0, 0, cR * 1.6);
        cg.addColorStop(0, "rgba(255,255,230,1)");
        cg.addColorStop(0.5, "rgba(255,235,130,0.85)");
        cg.addColorStop(1, "rgba(255,180,60,0)");
        ctx.beginPath();
        ctx.arc(0, 0, cR * 1.6, 0, Math.PI * 2);
        ctx.fillStyle = cg;
        ctx.shadowBlur = 22;
        ctx.shadowColor = "rgba(255,240,130,0.9)";
        ctx.fill();
        ctx.restore();
      }

      function drawMoon() {
        const mx = W * 0.5,
          my = H * 0.35,
          r = Math.min(W, H) * 0.048;
        const g = ctx.createRadialGradient(mx, my, 0, mx, my, r * 6);
        g.addColorStop(0, "rgba(255,232,248,0.20)");
        g.addColorStop(0.2, "rgba(255,205,235,0.05)");
        g.addColorStop(1, "rgba(0,0,0,0)");
        ctx.save();
        ctx.beginPath();
        ctx.arc(mx, my, r * 6, 0, Math.PI * 2);
        ctx.fillStyle = g;
        ctx.fill();
        ctx.restore();
      }

      let uiOn = false;

      function draw(now) {
        const elapsed = now - T0;
        const t = elapsed;

        ctx.clearRect(0, 0, W, H);

        drawMoon();

        const unit = UNIT();
        const bx = W * 0.5,
          by = H * 0.48; // Moved higher

        // 1. STEMS (Back layer)
        FLOWERS.forEach((f, i) => {
          const delay = LEAVES.length * STAGGER * 0.5 + i * STAGGER * 1.1;
          const raw = clamp((elapsed - delay) / ASM, 0, 1);
          const sw = raw >= 1 ? sway(f.phase, f.spd, t) : 0;
          const finalX = bx + f.ox * unit,
            finalY = by + f.oy * unit;
          const fixedFlx = finalX + (raw >= 1 ? Math.sin(sw) * unit * 0.03 : 0);
          const a = clamp(raw * 2.2, 0, 1);
          stem(bx, by, fixedFlx, finalY, a * 0.9);
        });

        // 2. LEAVES (Middle layer)
        LEAVES.forEach((l, i) => {
          const delay = i * STAGGER;
          const raw = clamp((elapsed - delay) / ASM, 0, 1);
          const prog = easeOutBack(raw);
          const finalX = bx + l.ox * unit,
            finalY = by + l.oy * unit;
          const sx = bx + LSCATTER[i].x,
            sy = by + LSCATTER[i].y;
          const lx = lerp(sx, finalX, prog),
            ly = lerp(sy, finalY, prog);
          const sw = raw >= 1 ? sway(l.phase, 0.8, t) : 0;
          leaf(lx, ly, l.side, l.size, sw, unit, clamp(raw * 2.5, 0, 1));
        });

        // 3. FLOWERS (Front layer)
        FLOWERS.forEach((f, i) => {
          const delay = LEAVES.length * STAGGER * 0.5 + i * STAGGER * 1.1;
          const raw = clamp((elapsed - delay) / ASM, 0, 1);
          const prog = easeOutBack(raw);
          const finalX = bx + f.ox * unit,
            finalY = by + f.oy * unit;
          const sx = bx + FSCATTER[i].x,
            sy = by + FSCATTER[i].y;
          const fx = lerp(sx, finalX, prog),
            fy = lerp(sy, finalY, prog);
          const sw = raw >= 1 ? sway(f.phase, f.spd, t) : 0;
          const flx = fx + (raw >= 1 ? Math.sin(sw) * unit * 0.03 : 0);
          const a = clamp(raw * 2.2, 0, 1);
          flower(flx, fy, f.petals, f.size, sw, unit, a);
        });

        const totalDuration =
          LEAVES.length * STAGGER * 0.5 + FLOWERS.length * STAGGER * 1.1 + ASM;
        if (!uiOn && elapsed > totalDuration * 0.4) {
          document.getElementById("ui").classList.add("on");
          uiOn = true;
        }

        requestAnimationFrame(draw);
      }
      requestAnimationFrame(draw);
    </script>
  </body>
</html>
